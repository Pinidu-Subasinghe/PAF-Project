spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/smartcampus_db;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.frontend.oauth-success-url=${FRONTEND_OAUTH_SUCCESS_URL:http://localhost:5173/}
app.frontend.oauth-failure-url=${FRONTEND_OAUTH_FAILURE_URL:http://localhost:5173/login}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.jwt.secret=${JWT_SECRET:dev-secret-change-this-to-32-bytes-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.jwt.issuer=${JWT_ISSUER:smart-campus}
